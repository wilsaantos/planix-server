version: '3.8'

services:
  db:
    image: postgres:15
    container_name: planix_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: planix
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: planix_api
    depends_on:
      - db
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/planix
    command: npm run start:prod

volumes:
  pgdata: